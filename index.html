<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Магазин оновлюється | Скоро відкриття</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Декоративні елементи */
        .bg-shapes {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 1;
        }

        .shape {
            position: absolute;
            border-radius: 50%;
            opacity: 0.1;
            animation: float 6s ease-in-out infinite;
        }

        .shape:nth-child(1) {
            width: 300px;
            height: 300px;
            background: #fff;
            top: -50px;
            left: -50px;
            animation-delay: 0s;
        }

        .shape:nth-child(2) {
            width: 200px;
            height: 200px;
            background: #fff;
            bottom: -30px;
            right: -30px;
            animation-delay: 2s;
        }

        .shape:nth-child(3) {
            width: 150px;
            height: 150px;
            background: #fff;
            top: 60%;
            left: 10%;
            animation-delay: 4s;
        }

        .shape:nth-child(4) {
            width: 100px;
            height: 100px;
            background: #fff;
            top: 20%;
            right: 15%;
            animation-delay: 1s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
            }
            50% {
                transform: translateY(-20px) rotate(10deg);
            }
        }

        /* Основний контейнер */
        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 30px;
            padding: 60px 50px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.2);
            z-index: 2;
            max-width: 550px;
            width: 90%;
            backdrop-filter: blur(10px);
            animation: slideIn 0.8s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            font-size: 70px;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.1);
            }
        }

        h1 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 15px;
            font-weight: 700;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 35px;
            line-height: 1.6;
        }

        /* Таймер зворотного відліку */
        .countdown {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            flex-wrap: wrap;
        }

        .time-block {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 15px;
            padding: 20px 15px;
            min-width: 80px;
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .time-block .number {
            font-size: 2.5em;
            font-weight: 700;
            display: block;
            line-height: 1;
        }

        .time-block .label {
            font-size: 0.85em;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.9;
            margin-top: 5px;
        }

        /* Прогрес-бар */
        .progress-container {
            margin-bottom: 35px;
        }

        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            color: #555;
            font-size: 0.9em;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #e0e0e0;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 10px;
            width: 68%;
            animation: progressAnim 2s ease-out;
        }

        @keyframes progressAnim {
            from { width: 0; }
            to { width: 68%; }
        }

        /* Форма підписки */
        .subscribe-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .subscribe-form input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 50px;
            font-size: 1em;
            outline: none;
            transition: all 0.3s ease;
        }

        .subscribe-form input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .subscribe-form button {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-size: 1em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .subscribe-form button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .subscribe-form button:active {
            transform: translateY(0);
        }

        .social-text {
            color: #888;
            font-size: 0.9em;
            margin-top: 15px;
        }

        .social-icons {
            margin-top: 10px;
            font-size: 1.8em;
            letter-spacing: 15px;
            opacity: 0.7;
        }

        /* Адаптивність */
        @media (max-width: 480px) {
            .container {
                padding: 40px 25px;
                border-radius: 20px;
            }

            h1 {
                font-size: 1.8em;
            }

            .countdown {
                gap: 10px;
            }

            .time-block {
                min-width: 65px;
                padding: 15px 10px;
            }

            .time-block .number {
                font-size: 1.8em;
            }

            .subscribe-form {
                flex-direction: column;
            }

            .subscribe-form button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Декоративні фігури на фоні -->
    <div class="bg-shapes">
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
        <div class="shape"></div>
    </div>

    <!-- Основний контент -->
    <div class="container">
        <div class="icon">🛠️</div>
        <h1>МАГАЗИН ОНОВЛЮЄТЬСЯ</h1>
        <p class="subtitle">
            Ми працюємо над покращенням, щоб зробити ваш досвід покупок ще кращим. 
            Дякуємо за терпіння! ✨
        </p>

        <!-- Таймер зворотного відліку -->
        <div class="countdown" id="countdown">
            <div class="time-block">
                <span class="number" id="days">00</span>
                <span class="label">Днів</span>
            </div>
            <div class="time-block">
                <span class="number" id="hours">00</span>
                <span class="label">Годин</span>
            </div>
            <div class="time-block">
                <span class="number" id="minutes">00</span>
                <span class="label">Хвилин</span>
            </div>
            <div class="time-block">
                <span class="number" id="seconds">00</span>
                <span class="label">Секунд</span>
            </div>
        </div>

        <!-- Прогрес оновлення -->
        <div class="progress-container">
            <div class="progress-text">
                <span>Прогрес оновлення</span>
                <span>68%</span>
            </div>
            <div class="progress-bar">
                <div class="progress-fill"></div>
            </div>
        </div>

        <!-- Форма підписки на сповіщення -->
        <form class="subscribe-form" id="subscribeForm">
            <input type="email" placeholder="Введіть ваш email" required>
            <button type="submit">Сповістити</button>
        </form>

    <script>
        // Таймер зворотного відліку (цільова дата: через 3 дні від сьогодні)
        const targetDate = new Date();
        targetDate.setDate(targetDate.getDate() + 3);
        targetDate.setHours(23, 59, 59, 0); // Встановлюємо час на кінець дня

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = targetDate - now;

            if (distance < 0) {
                // Якщо час вийшов
                document.getElementById('days').textContent = '00';
                document.getElementById('hours').textContent = '00';
                document.getElementById('minutes').textContent = '00';
                document.getElementById('seconds').textContent = '00';
                return;
            }

            const days = Math.floor(distance / (1000 * 60 * 60 * 24));
            const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((distance % (1000 * 60)) / 1000);

            document.getElementById('days').textContent = String(days).padStart(2, '0');
            document.getElementById('hours').textContent = String(hours).padStart(2, '0');
            document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
            document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
        }

        // Оновлюємо таймер кожну секунду
        updateCountdown();
        setInterval(updateCountdown, 1000);

        // Обробка форми підписки
        document.getElementById('subscribeForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const emailInput = this.querySelector('input[type="email"]');
            const email = emailInput.value.trim();

            if (email && email.includes('@')) {
                // Імітація відправки
                const button = this.querySelector('button');
                const originalText = button.textContent;
                button.textContent = '✅ Дякуємо!';
                button.style.background = 'linear-gradient(135deg, #11998e, #38ef7d)';
                emailInput.value = '';

                setTimeout(() => {
                    button.textContent = originalText;
                    button.style.background = 'linear-gradient(135deg, #667eea, #764ba2)';
                }, 3000);
            }
        });
    </script>

</body>
</html>
